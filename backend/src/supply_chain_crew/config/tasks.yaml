# tasks.yaml — Sequential Task Pipeline Definitions
#
# Three tasks forming a sequential chain:
#   risk_analysis_task → inventory_impact_task → routing_strategy_task
#
# Each task's output feeds into the next via CrewAI's context mechanism.
# The final task enforces structured Pydantic output.

risk_analysis_task:
  description: >
    Conduct a comprehensive risk analysis of the following global supply
    chain disruption:

    CRISIS EVENT: {crisis_description}

    Your analysis must cover:
    1. Threat severity classification (Critical / High / Medium / Low)
    2. Affected ports and logistics infrastructure with IATA/UNLOC codes
    3. Current weather conditions and secondary environmental risks
    4. Relevant news intelligence from major financial outlets
    5. Geopolitical factors that may accelerate or delay resolution
    6. Estimated disruption duration with conservative and optimistic scenarios

    Be specific and cite realistic data points. This is a simulation for a
    supply chain optimization system, so provide detailed, realistic analysis.
  expected_output: >
    A structured JSON object with the following keys:
    - "threatLevel": one of "Critical", "High", "Medium", "Low"
    - "eventName": short name for the crisis event
    - "eventDescription": 2-3 sentence description of the crisis
    - "affectedPorts": array of affected port names with IATA/UNLOC codes
    - "weatherConditions": weather and secondary environmental risks
    - "newsHeadlines": array of 3-5 relevant headlines from major outlets
    - "geopoliticalFactors": array of 2-4 geopolitical risk factors
    - "estimatedDuration": estimated disruption duration range string
  agent: global_risk_scout

inventory_impact_task:
  description: >
    Based on the Global Risk Scout's threat assessment (provided as context),
    analyze the inventory impact of this supply chain disruption.

    CURRENT INVENTORY STATUS: {current_inventory_status}

    {user_settings}

    Your analysis must include:
    1. Identification of the most critical components at risk of stockout
    2. For each critical component: current stock level, daily consumption
       (burn rate), days until depletion, and reorder point threshold
    3. Total number of SKUs affected across all product lines
    4. Total revenue at risk in USD
    5. Specific production line impact (which lines will halt and when)

    IMPORTANT: Use the "Minimum Safety Stock" parameter from the corporate
    configuration above. Any component with fewer days of supply remaining
    than the configured safety stock threshold should be flagged as CRITICAL.

    Provide precise numerical projections. Use the inventory data provided
    to calculate realistic depletion timelines.
  expected_output: >
    A structured JSON object with the following keys:
    - "criticalItems": array of objects, each with "name" (string),
      "currentStock" (integer), "dailyBurnRate" (integer),
      "daysUntilDepletion" (integer), "reorderPoint" (integer),
      and "status" (one of "Critical", "Warning", "Stable")
    - "totalSkusAffected": integer count of total SKUs impacted
    - "revenueAtRisk": string like "$4.2M"
    - "productionLineImpact": string summarizing production line impact
  agent: inventory_forecaster

routing_strategy_task:
  description: >
    Using both the risk assessment and inventory impact analysis (provided
    as context), generate exactly 3 mitigation plans for the supply chain
    crisis.

    AFFECTED ROUTES: {affected_routes}

    {user_settings}

    STRICT REQUIREMENTS for each plan:
    - id: a unique identifier (use 'plan-a', 'plan-b', 'plan-c')
    - name: short name ('Plan A', 'Plan B', 'Plan C')
    - strategy: the core approach (e.g., 'Wait & Monitor', 'Reroute via Rail',
      'Emergency Air Freight')
    - description: 1-2 sentence summary of the approach
    - estimatedCost: human-readable cost string (e.g., '$340,000 — $410,000')
    - timeframe: delivery timeframe (e.g., '12-16 days')
    - riskLevel: exactly one of 'Low', 'Medium', or 'High'
    - co2Impact: environmental comparison (e.g., '-18% vs. original sea route')
    - reliabilityScore: integer between 0-100 representing reliability percentage
    - details: list of 4-5 specific bullet points about the plan

    CRITICAL INSTRUCTIONS based on corporate configuration:
    - Your cost estimates MUST respect the "Maximum Air Freight Budget". If Plan C
      (air freight) exceeds this budget, explicitly note it requires budget exception.
    - The "Risk Tolerance" level should influence your reliability scores and
      which plan you implicitly recommend (higher tolerance = favor cheaper plans).
    - If a "Preferred Carrier" is specified, include that carrier in at least
      one plan's details and routing options.
    - The "Cost Optimization Mode" should determine the overall tone:
      aggressive = emphasize cost savings, conservative = emphasize reliability.
    - If "Auto-Reroute" is enabled, note in applicable plans that execution
      can proceed automatically without human authorization.

    The three plans MUST follow this pattern:
    - Plan A: Conservative / lowest cost / highest risk (Wait & Monitor type)
    - Plan B: Balanced / moderate cost / moderate risk (Alternative routing type)
    - Plan C: Aggressive / highest cost / lowest risk (Emergency air freight type)

    Return the result as a structured JSON object with a "plans" key containing
    a list of exactly 3 plan objects.
  expected_output: >
    A JSON object with a "plans" array containing exactly 3 mitigation plan
    objects. Each plan must have all 10 required fields: id, name, strategy,
    description, estimatedCost, timeframe, riskLevel (Low/Medium/High),
    co2Impact, reliabilityScore (integer 0-100), and details (array of strings).
    Plans must clearly reflect the corporate configuration parameters.
  agent: routing_strategist
